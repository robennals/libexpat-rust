name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run all tests including C-vs-Rust comparison
        run: cargo test -p expat-rust

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p expat-rust -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -p expat-rust -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc -p expat-rust --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  c-tests:
    name: C Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build C test runner
        run: cargo build -p c-tests-runner
      - name: Run C test suite against Rust parser
        run: |
          PASS=$(./target/debug/c-tests-runner 2>/dev/null | grep -c "^PASS:" || true)
          FAIL=$(./target/debug/c-tests-runner 2>/dev/null | grep -c "^FAIL " || true)
          TOTAL=$((PASS + FAIL))
          echo "C test results: $PASS pass, $FAIL fail out of $TOTAL"
          echo ""
          echo "=== Failing tests ==="
          ./target/debug/c-tests-runner 2>/dev/null | grep "^FAIL " || true
          echo ""
          # Fail CI if pass count drops below current baseline
          BASELINE=194
          if [ "$PASS" -lt "$BASELINE" ]; then
            echo "REGRESSION: $PASS passes is below baseline of $BASELINE"
            exit 1
          fi
          echo "OK: $PASS passes meets or exceeds baseline of $BASELINE"

  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@1.70.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p expat-rust
